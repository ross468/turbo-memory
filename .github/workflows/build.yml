name: Build 3DS Homebrew

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitarm:latest
      options: --user root
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          dkp-pacman -S --noconfirm 3ds-dev citro2d citro3d

      - name: Build
        run: |
          ls -la
          ls -la source/ 2>/dev/null || echo "source 폴더 없음"
          find . -name "*.cpp" | head -20
          make
        env:
          DEVKITPRO: /opt/devkitpro
          DEVKITARM: /opt/devkitpro/devkitARM

      - name: List files
        run: find . -name "*.3dsx" -o -name "*.3ds" | head -20

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: win7_3ds
          path: win7_3ds.3dsx
